apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: webhook-tester
  title: Webhook Tester
  description: Webhook Tester is a forked repo to be able to keep webhook endpoints for indefinite time, and use it for smoke tests for the webhook-backend service.
  tags:
    - owned-by-pontoon
    - php
    - smoke-test
    - testing
    - webhook-tester
  annotations:
    bridge.io/language: php
    bridge.io/tier: backend
    bridge.io/php-version: '7.1.0'
    github.com/project-slug: get-bridge/webhook-tester
    backstage.io/source-location: url:https://github.com/get-bridge/webhook-tester
    backstage.io/techdocs-ref: dir:.
spec:
  type: service
  lifecycle: production
  owner: group:pontoon
  system: quality
